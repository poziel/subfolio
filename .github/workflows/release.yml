name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: Semantic version bump to publish.
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
          - no-release
      notes:
        description: Release/changelog markdown for manual releases.
        required: false
        type: string

permissions:
  contents: write
  issues: read
  pull-requests: read

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  publish_release:
    name: Publish release
    if: "${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore(release): publish ') }}"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve release metadata
        id: release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_NOTES_PATH: .release-notes.md
        run: node .github/scripts/release-metadata.mjs

      - name: Stop for no-release PR
        if: steps.release.outputs.skip == 'true'
        run: echo "${{ steps.release.outputs.skip_reason }}"

      - name: Update changelog and package version
        if: steps.release.outputs.skip != 'true'
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
          RELEASE_PREVIOUS_VERSION: ${{ steps.release.outputs.previous_version }}
          RELEASE_NOTES_PATH: ${{ steps.release.outputs.release_notes_path }}
        run: node .github/scripts/write-release-files.mjs

      - name: Commit release files
        if: steps.release.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md package.json package-lock.json
          git diff --cached --quiet && { echo "No release file changes to commit"; exit 1; }
          git commit -m "chore(release): publish v${{ steps.release.outputs.version }}"
          git push origin HEAD:main

      - name: Publish GitHub release
        if: steps.release.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_commit="$(git rev-parse HEAD)"
          gh release create "v${{ steps.release.outputs.version }}" \
            --title "v${{ steps.release.outputs.version }}" \
            --notes-file "${{ steps.release.outputs.release_notes_path }}" \
            --target "$release_commit" \
            --latest
